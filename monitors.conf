# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,2

# Apple Studio Display (5K 27") - links, via Thunderbolt
monitor = DP-7, 5120x2880@60, 0x0, 2

# Framework Laptop 13 - rechts, vertikal zentriert
# logische Höhe: Studio Display = 1440px, Laptop = 960px → y-Offset = (1440-960)/2 = 240
monitor = eDP-1, 2880x1920@120, 2560x240, 2

# Phantom-Tile des Studio Displays deaktivieren
monitor = DP-8, disable
